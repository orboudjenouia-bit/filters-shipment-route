services:
  db:
    image: postgres:16-alpine
    container_name: prpg06-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prpg06}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prpg06}
      POSTGRES_DB: ${POSTGRES_DB:-prpg06}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prpg06} -d ${POSTGRES_DB:-prpg06}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prpg06-server
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npx prisma migrate deploy && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-prpg06}:${POSTGRES_PASSWORD:-prpg06}@db:5432/${POSTGRES_DB:-prpg06}?schema=public
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-.env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      EMAIL: ${EMAIL:-}
      PASSWORD: ${PASSWORD:-}
      MAILTRAP_ENDPOINT: ${MAILTRAP_ENDPOINT:-}
      MAILTRAP_TOKEN: ${MAILTRAP_TOKEN:-}
    ports:
      - "${SERVER_PORT:-4000}:4000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: prpg06-client
    restart: unless-stopped
    working_dir: /app
    command: npm start
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: "0"
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000/api}
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    depends_on:
      - server
    stdin_open: true
    tty: true

volumes:
  db_data:
  server_node_modules:
  client_node_modules:
